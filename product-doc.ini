深入分析 **UniScribe**（https://uniscribe.co）这款产品，它是一个核心功能为“音视频转文字 + AI 深度加工（总结、思维导图、Q&A、翻译）”的 SaaS 工具。支持本地文件上传和 YouTube 链接输入，并提供多格式导出（SRT, VTT, PDF 等）。

使用 **Next.js + Prisma + TiDB Cloud + Redis** 的技术栈。Redis 则用于缓存和异步任务队列。

项目需要实现https://uniscribe.co的所有功能，实现这样一个音视频 AI 处理工具，现有技术栈可以按如下架构分工，同时我们还需要引入一些**必须的关键技术**。

项目名称为 Vocto ；国际化语言与https://uniscribe.co一致，浏览器导航栏光标悬浮显示：免费在线语音转文本转换器 （实现国际化，与页面语言一致）

