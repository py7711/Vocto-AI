### 二、 必须的关键技术与第三方服务

#### 1. 音视频处理与下载组件：FFmpeg & yt-dlp

* **yt-dlp：** 当用户输入 YouTube 链接时，后端（Worker）需要使用 `yt-dlp` 解析并单独提取/下载音频流（通常是 m4a/mp3 格式），避免下载庞大的视频文件。
* **FFmpeg：** 用户上传的音视频格式多达 11 种。转写前需要用 FFmpeg 进行音视频预处理：
* 压缩大文件（免费用户限制 30 分钟，付费支持 5G/10小时）。
* 统一重采样（通常转为 16kHz, 单声道 wav 或 mp3）以提升 AI 转写效率并降低存储成本。
* **提取声纹：** 如果需要识别发言人（Speaker Diarization），可能需要先通过 FFmpeg 截取音频。



#### 2. 异步任务队列：BullMQ (基于 Redis)

音视频转写和 AI 处理是**典型的长耗时任务（Heavy Async Jobs）**，Next.js 的 Serverless 函数或普通的 API 路由极容易超时（Vercel 限制通常为 15s-5s，自建 Node.js 也不建议阻塞进程）。

* **引入 BullMQ：** 将 Next.js 接收到的转写任务（本地文件存储路径或 YouTube 链接）作为一个 Job 推入 BullMQ。
* **独立 Worker 集群：** 编写一个独立的 Node.js 长期运行的服务（Worker），专门负责从队列中消费任务，调用 FFmpeg 并在转写完成后更新 TiDB。

#### 3. 对象存储（Object Storage）：AWS S3 / Cloudflare R2

* 用于存放用户上传的原始音视频文件以及导出的 PDF/Word 文件。
* 使用 **Cloudflare R2**。

#### 4. 核心 AI 能力层（模型与 API）
* Groq Whisper、Deepgram、AssemblyAI： 三个都需完整接入，出现异常自动切下一个， 首页调用选择最适合当前功能的服务商模型与 API。

* **语音转文字（STT）：** 使用 **Groq Whisper：** 适合直接调用，速度极快。

