**Node.js (`ws`):**
```javascript
import WebSocket from 'ws';

const ws = new WebSocket(
  'wss://streaming.assemblyai.com/v3/ws?sample_rate=16000&speech_model=u3-rt-pro',
  { headers: { authorization: process.env.ASSEMBLYAI_API_KEY } },
