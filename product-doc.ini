### 三、 整体系统架构与数据流向

1. **上传/提交：** 用户在 Next.js 前端上传文件到 Cloudflare R2，或者提交 YouTube 链接。Next.js 向 TiDB 插入一条 `status: processing` 的记录，并将任务 ID 推入 **Redis (BullMQ)**。
2. **异步消费：** **Worker 服务**监听到新任务：
* 如果是 YouTube，用 `yt-dlp` 下载音频到本地。
* 用 `FFmpeg` 统一转化为 Whisper 最喜欢的格式。


3. **AI 转写：** Worker 请求 **Whisper API**（或自建服务），拿到带有 `text, start_time, end_time` 的原始 JSON 数据。
4. **AI 加工：** 将文本发给 **LLM**，让其输出特定 Prompt 约束下的总结（Summary）和思维导图结构（Mindmap JSON）。
5. **持久化与通知：** Worker 将所有结果通过 Prisma 写入 **TiDB**，修改任务状态为 `completed`，同时通过 **Redis Pub/Sub** 触发 Next.js 的 Server-Sent Events (SSE)，前端页面无刷新实时展示出“转写成功”并渲染出文本和导图。
