### 一、 现有技术栈的实现方案与职责划分

#### 1. Next.js (Frontend & Backend API)

* **前端（App Router）：** 负责响应式 UI（文件拖拽上传区、YouTube 链接输入框、转写状态进度条、交互式文本编辑器、思维导图渲染展示）。
* **后端（Route Handlers / Server Actions）：** * 处理用户鉴权、订阅状态校验、配额检查（如免费用户每日3次，单次限30分钟）。
* 生成云存储的**预签名上传链接（Presigned URL）**，让前端直接将大文件上传到对象存储，避免服务器带宽过载。
* 接收 YouTube 链接请求，将其推送到异步队列。



#### 2. Prisma + TiDB (数据持久层)

* **TiDB** 的分布式架构非常适合存储这类 SaaS 产品随着时间推移产生的大量长文本转写数据（单次会议转写可能达数万字）。
* **表结构设计（模型层）：实现所有功能完善并补充下面的表结构设计，表字段需要添加中文注释**
* `User` & `Subscription`：用户及 Stripe 订阅状态、剩余分钟数配额。
* `MediaTask`：转写任务表（记录文件 URL、状态：Uploading/Processing/Completed/Failed、语言、音视频时长）。
* `Transcript`：核心文本转写结果，可以使用 TiDB 的 `LONGTEXT` 或 `JSON` 格式，存储带有时间戳（Timestamp）**和**发言人标签（Speaker ID）的段落数据。
* `AIInsight`：存储 AI 生成的总结、Q&A 和思维导图（JSON 格式）。



#### 3. Redis (状态同步与任务路由)

* **速率限制（Rate Limiting）：** 限制匿名或免费用户的 API 请求频率。
* **WebSocket/SSE 状态同步：** 当后端异步 worker 完成转写或 AI 分析后，通过 Redis Pub/Sub 通知 Next.js 服务端，实时推送更新给前端。
* **分布式锁：** 防止用户并发提交多次扣减配额。

