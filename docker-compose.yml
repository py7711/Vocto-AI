# Votxt Docker Compose
# - 容器内服务：nginx、redis、votxt-web、votxt-worker
# - 外挂：TiDB Cloud（DATABASE_URL）
# - YouTube cookies 宿主机固定路径：/data/config/youtube-cookies.txt

name: votxt

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--bind", "0.0.0.0", "--protected-mode", "no"]
    volumes:
      - redis-data:/data
    networks:
      - votxt
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    networks:
      - votxt
    expose:
      - "8191"

  votxt-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: votxt-app:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3091"
      REDIS_URL: redis://redis:6379
      YT_DLP_PATH: /opt/votxt/bin/yt-dlp
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      YT_DLP_COOKIES_PATH: /config/youtube-cookies.txt
      LOG_DIR: /logs
      LOG_SERVICE: web
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - /data/config/youtube-cookies.txt:/config/youtube-cookies.txt:ro
      - /logs/votxt:/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - votxt
    expose:
      - "3091"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3091/').then((r)=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  votxt-worker:
    image: votxt-app:local
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/votxt-worker-entrypoint.sh"]
    command: ["pnpm", "run", "worker"]
    # Chromium needs shared memory; avoid /dev/shm too small in containers.
    shm_size: "1gb"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      YT_DLP_PATH: /opt/votxt/bin/yt-dlp
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      YT_DLP_COOKIES_PATH: /config/youtube-cookies.txt
      LOG_DIR: /logs
      LOG_SERVICE: worker
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      YTDOWN_ENABLED: "true"
      YTDOWN_URL: "https://app.ytdown.to/zh31/youtube-to-mp3/"
      YTDOWN_FLARESOLVERR_URL: "http://flaresolverr:8191"
      YTDOWN_RESOLVE_TIMEOUT_MS: "60000"
    volumes:
      - /data/config/youtube-cookies.txt:/config/youtube-cookies.txt:ro
      - /logs/votxt:/logs
    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_started
      votxt-web:
        condition: service_started
    networks:
      - votxt

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/votxt.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      votxt-web:
        condition: service_healthy
    networks:
      - votxt

networks:
  votxt:
    driver: bridge

volumes:
  redis-data:
